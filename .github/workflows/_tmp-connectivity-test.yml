name: tmp-connectivity-test
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test gutendex.com reachability
        run: |
          curl -s -o /dev/null -w "gutendex.com: HTTP %{http_code}\n" --max-time 15 "https://gutendex.com/books/?page=1"
          curl -s -o /dev/null -w "gutenberg.org: HTTP %{http_code}\n" --max-time 15 "https://www.gutenberg.org/files/1342/1342-0.txt"
