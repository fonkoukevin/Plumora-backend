name: backend-ci

# Continuous integration for the Spring Boot backend. Runs on every pull request and every push,
# on any branch. Intentionally has no access to any production secret: it only ever builds and
# tests this repository's own source code with disposable, hardcoded-safe values, never talks to
# a registry or a VPS. Building/publishing images is release.yml's job; deploying is deploy.yml's
# job - both are separate workflows restricted to main/tags, never triggered by a pull request
# (see deploy/README.md, section "CI/CD").

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test and package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        # Includes the Testcontainers-based integration tests (FlywayMigrationIntegrationTest,
        # ProductionProfileStartupIntegrationTest): ubuntu-latest runners have Docker available
        # natively, no extra setup needed. AI_PROVIDER is forced to "mock" by
        # application-test.yml regardless of environment, so no test ever calls the real Gemini
        # API, and none of this needs a Gemini/JWT/DB secret - see application-test.yml.
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp clean test

      - name: Package
        run: ./mvnw -B -ntp package -DskipTests

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 14

  docker-smoke-test:
    name: Docker build + compose smoke test
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Carried over from the previous ci.yml: catches a broken Dockerfile or docker-compose.yml
    # before merge, independently of release.yml (which only builds on main/tags). Uses only
    # disposable, CI-local dummy values, never a real secret.
    env:
      POSTGRES_DB: plumora_ci
      POSTGRES_USER: plumora_ci
      POSTGRES_PASSWORD: plumora_ci_password
      JWT_SECRET: plumora-ci-secret-plumora-ci-secret-plumora-ci-secret-2026
      JWT_EXPIRATION: 86400000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Start API stack
        run: docker compose up -d --build postgres api

      - name: Wait for OpenAPI endpoint
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:8080/api/v1/api-docs > openapi.json; then
              exit 0
            fi
            echo "Waiting for Plumora API... attempt ${attempt}/60"
            sleep 2
          done

          docker compose logs api
          exit 1

      - name: Verify healthcheck endpoint is public and healthy
        run: |
          code="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/v1/actuator/health)"
          if [ "${code}" != "200" ]; then
            echo "Expected HTTP 200 from /api/v1/actuator/health, got ${code}" >&2
            exit 1
          fi

      - name: Verify OpenAPI critical routes
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          spec = json.loads(Path("openapi.json").read_text(encoding="utf-8"))
          paths = set(spec.get("paths", {}).keys())
          expected_paths = {
              "/auth/register",
              "/auth/login",
              "/auth/me",
              "/books",
              "/books/my-books",
              "/books/{bookId}",
              "/books/{bookId}/publish",
              "/catalog/books",
              "/catalog/books/{bookId}",
              "/catalog/books/search",
              "/catalog/books/popular",
              "/catalog/books/latest",
              "/catalog/genres",
              "/books/{bookId}/reading-progress",
              "/books/{bookId}/favorites",
              "/books/{bookId}/reviews",
              "/beta-comments",
              "/notifications/my",
              "/ai/writing/suggestions",
              "/ai/recommendations/books",
              "/books/{bookId}/reports",
              "/admin/users",
              "/admin/books",
              "/admin/reports",
          }

          missing = sorted(expected_paths - paths)
          if missing:
              raise SystemExit(f"Missing OpenAPI paths: {', '.join(missing)}")

          print(f"OpenAPI OK: {len(paths)} paths found.")
          PY

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop compose stack
        if: always()
        run: docker compose down -v --remove-orphans
