name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Maven Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp clean test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t plumora-api:ci .

  compose-smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build
    timeout-minutes: 20

    env:
      POSTGRES_DB: plumora_ci
      POSTGRES_USER: plumora_ci
      POSTGRES_PASSWORD: plumora_ci_password
      JWT_SECRET: plumora-ci-secret-plumora-ci-secret-plumora-ci-secret-2026
      JWT_EXPIRATION: 86400000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config

      - name: Start API stack
        run: docker compose up -d --build postgres api

      - name: Wait for OpenAPI endpoint
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:8080/api/v1/api-docs > openapi.json; then
              exit 0
            fi
            echo "Waiting for Plumora API... attempt ${attempt}/60"
            sleep 2
          done

          docker compose logs api
          exit 1

      - name: Verify OpenAPI critical routes
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          spec = json.loads(Path("openapi.json").read_text(encoding="utf-8"))
          paths = set(spec.get("paths", {}).keys())
          expected_paths = {
              "/auth/register",
              "/auth/login",
              "/auth/me",
              "/books",
              "/books/my-books",
              "/books/{bookId}",
              "/books/{bookId}/publish",
              "/catalog/books",
              "/catalog/books/{bookId}",
              "/catalog/books/search",
              "/catalog/books/popular",
              "/catalog/books/latest",
              "/catalog/genres",
              "/books/{bookId}/reading-progress",
              "/books/{bookId}/favorites",
              "/books/{bookId}/reviews",
              "/beta-comments",
              "/notifications/my",
              "/ai/writing/suggestions",
              "/ai/recommendations/books",
              "/books/{bookId}/reports",
              "/admin/users",
              "/admin/books",
              "/admin/reports",
          }

          missing = sorted(expected_paths - paths)
          if missing:
              raise SystemExit(f"Missing OpenAPI paths: {', '.join(missing)}")

          print(f"OpenAPI OK: {len(paths)} paths found.")
          PY

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop compose stack
        if: always()
        run: docker compose down -v --remove-orphans
