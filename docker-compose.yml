services:
  postgres:
    image: postgres:17
    container_name: plumora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plumora_db}
      POSTGRES_USER: ${POSTGRES_USER:-plumora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plumora}
    ports:
      - "5432:5432"
    volumes:
      - plumora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plumora-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plumora-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-plumora_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-plumora}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-plumora}
      JWT_SECRET: ${JWT_SECRET:-change-me-for-local-development-only}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "8080:8080"
    networks:
      - plumora-network

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: plumora-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@plumora.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - plumora_pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - plumora-network

volumes:
  plumora_postgres_data:
  plumora_pgadmin_data:

networks:
  plumora-network:
    driver: bridge
