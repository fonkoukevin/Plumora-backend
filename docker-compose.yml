services:
  postgres:
    image: postgres:17
    container_name: plumora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - plumora_postgres_data:/var/lib/postgresql/data
    networks:
      - plumora-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plumora-api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - plumora-network

volumes:
  plumora_postgres_data:

networks:
  plumora-network:
    driver: bridge