# Profil de production, active via SPRING_PROFILES_ACTIVE=prod.
#
# Les valeurs sensibles n'ont volontairement aucune valeur par defaut : si une variable
# d'environnement requise est absente, Spring refuse de demarrer avec une erreur de
# resolution de placeholder. Des controles supplementaires (secret trop faible, valeur de
# developpement connue, Gemini active sans cle) sont effectues plus tot et plus explicitement
# par com.plumora.api.shared.config.ProductionEnvironmentValidator.
#
# Aucune donnee de demonstration : DevAdminSeeder est annote @Profile("dev") et ne peut pas
# s'activer ici tant que "dev" n'est pas ajoute a SPRING_PROFILES_ACTIVE (a ne jamais faire en
# production).

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  forward-headers-strategy: framework
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    whitelabel:
      enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: INFO
    com.plumora.api: INFO
    org.hibernate.SQL: WARN
    org.springframework.web: WARN

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}
  external:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-flash-lite-latest}
      timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:30}
  ai:
    max-input-chars: ${GEMINI_MAX_INPUT_CHARS:12000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

plumora:
  ai:
    provider: ${AI_PROVIDER:mock}
    recommendation-provider: ${AI_PROVIDER:mock}
