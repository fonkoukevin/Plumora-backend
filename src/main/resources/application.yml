spring:
  application:
    name: plumora-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/plumora_db}
    username: ${SPRING_DATASOURCE_USERNAME:plumora}
    password: ${SPRING_DATASOURCE_PASSWORD:plumora}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PlumoraHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  lifecycle:
    timeout-per-shutdown-phase: 20s
  mail:
    # Only used when MAIL_PROVIDER=smtp (see plumora.mail.provider below); harmless if unset
    # otherwise - Spring only opens a connection when JavaMailSender.send(...) is actually called.
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    mail:
      # Actuator auto-registers a health check that pings the configured SMTP server. Email is an
      # optional feature here (defaults to logging the reset link, no SMTP needed at all) - a
      # third-party mail provider being briefly unreachable must never flip /actuator/health to
      # DOWN and trip the deploy pipeline's healthcheck gate for an unrelated feature.
      enabled: false

info:
  app:
    name: Plumora API
    description: Backend API for Plumora

app:
  storage:
    upload-dir: ${PLUMORA_UPLOAD_DIR:uploads}
    book-cover-public-path: uploads/book-covers
    max-book-cover-size-bytes: 5242880
  external:
    gutendex:
      base-url: ${GUTENDEX_BASE_URL:https://gutendex.com}
    gutenberg:
      catalog-url: ${GUTENBERG_CATALOG_URL:https://www.gutenberg.org/cache/epub/feeds/pg_catalog.csv}
    open-library:
      base-url: ${OPEN_LIBRARY_BASE_URL:https://openlibrary.org}
    gemini:
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-flash-lite-latest}
      timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:30}
  ai:
    max-input-chars: ${GEMINI_MAX_INPUT_CHARS:12000}
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-for-local-development-only}
      expiration: ${JWT_EXPIRATION:86400000}
    google:
      # Not secret (unlike a Google "client secret", which this app never needs: ID tokens are
      # verified locally against Google's public keys, no server-to-server call to Google using
      # credentials). Empty by default; POST /auth/google returns 503 until it's configured.
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  password-reset:
    token-expiration-minutes: ${PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:60}
    # Used to build the link sent to the user: {frontend-base-url}/reset-password?token=...
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

plumora:
  mail:
    # log (default): writes the reset link to the application log, no email sent - see
    # LoggingPasswordResetMailer. smtp: sends a real email via spring.mail.* above - see
    # SmtpPasswordResetMailer. Gmail SMTP requires the "From" address to be the authenticated
    # account itself (or a verified alias), hence defaulting to SMTP_USERNAME.
    provider: ${MAIL_PROVIDER:log}
    from-address: ${MAIL_FROM:${SMTP_USERNAME:}}
  ai:
    provider: ${AI_PROVIDER:mock}
    recommendation-provider: ${AI_PROVIDER:mock}
